name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Push dist to build branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save build output before switching branches
          cp -r dist /tmp/dist-output

          # Checkout build branch (or create orphan if first run)
          git fetch origin build 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/build; then
            git checkout -b build origin/build
          else
            git checkout --orphan build
            git rm -rf . --quiet
          fi

          # Replace content with new build
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          cp -r /tmp/dist-output/. .

          # Commit and push (regular push — no force, keeps linear history for Hostinger)
          git add .
          git diff --staged --quiet || git commit -m "build: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" build
